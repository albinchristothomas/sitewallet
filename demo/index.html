// Stylized QR
const QR = ({ payload, size=300 }) => {
  const N = 33;
  const cells = useMemo(() => {
    let h = 0; for (let i=0;i<payload.length;i++) h = (h*31 + payload.charCodeAt(i)) >>> 0;
    const rand = (i) => { let x=(h^(i*2654435761))>>>0; x^=x<<13;x>>>=0;x^=x>>17;x>>>=0;x^=x<<5;x>>>=0; return (x&0xff)/255; };
    const g = []; for (let y=0;y<N;y++) for (let x=0;x<N;x++) g.push(rand(y*N+x)>0.52?1:0);
    const carve = (cx,cy) => {
      for (let y=0;y<7;y++) for (let x=0;x<7;x++) {
        const i=(cy+y)*N+(cx+x); const border=x===0||x===6||y===0||y===6; const center=x>=2&&x<=4&&y>=2&&y<=4;
        g[i]=(border||center)?1:0;
      }
      for (let y=-1;y<=7;y++) for (let x=-1;x<=7;x++) if (x===-1||x===7||y===-1||y===7) {
        const xi=cx+x, yi=cy+y; if (xi>=0&&xi<N&&yi>=0&&yi<N) g[yi*N+xi]=0;
      }
    };
    carve(0,0); carve(N-7,0); carve(0,N-7);
    return g;
  }, [payload]);
  return (
    <div style={{ width:size, height:size, background:'#FACC15', padding:size*0.05, borderRadius:14 }}>
      <svg viewBox={`0 0 ${N} ${N}`} width="100%" height="100%" shapeRendering="crispEdges">
        {cells.map((v,i)=>{ if(!v) return null; const x=i%N, y=Math.floor(i/N); return <rect key={i} x={x} y={y} width={1.02} height={1.02} fill="#0E1116" />; })}
      </svg>
    </div>
  );
};

      <div style={{ marginTop:6, fontSize:28, fontWeight:700 }}>Set up a worksite</div>
      <div style={{ marginTop:6, fontSize:14, color:'var(--text-dim)' }}>
        Creates the operator company, project, requirements profile, and the site in one go.
      </div>
    </div>
    <div style={{ marginTop:28, display:'flex', flexDirection:'column', gap:24 }}>
      <Section title="Operator & project">
        <Row><FieldD label="Operator company" v="Tourmaline Oil Corp" /></Row>
        <Row><FieldD label="Project name" v="Karr Wapiti Drilling Program 2026" /></Row>
      </Section>
      <Section title="Site">
        <Row><FieldD label="Site name" v="Karr 12-34 Pad B" /></Row>
        <Row two>
          <FieldD label="Rig name" v="Precision 555" />
          <FieldD label="Rig number" v="555" mono />
        </Row>
        <Row><FieldD label="LSD / location" v={SITE.lsd} mono /></Row>
      </Section>
      <Section title="Required credentials">
        <div style={{ ...cardBase, padding:8 }}>
          {['H2S Alive','First Aid','CSO','Ground Disturbance Level II','WHMIS 2015','TDG','Fall Protection'].map((c,i) => (
            <label key={i} style={{ display:'flex', gap:12, padding:'10px 12px', borderRadius:8, cursor:'pointer' }}>
              <input type="checkbox" defaultChecked={i<5} style={{ marginTop:2, accentColor:'#FACC15' }} />
              <div style={{ fontSize:14, fontWeight:500 }}>{c}</div>
            </label>
          ))}
        </div>
      </Section>
      <button style={{ height:54, background:'var(--hi-yellow)', color:'#0E1116', border:0, borderRadius:12, fontSize:15, fontWeight:700, cursor:'pointer' }}>
        Create site
      </button>
    </div>
  </div>
);
const Section = ({ title, children }) => (
  <div>
    <Eyebrow>{title}</Eyebrow>
    <div style={{ marginTop:10, display:'flex', flexDirection:'column', gap:12 }}>{children}</div>
  </div>
);
const Row = ({ children, two }) => (
  <div style={{ display:'grid', gridTemplateColumns: two?'1fr 1fr':'1fr', gap:12 }}>{children}</div>
);
const FieldD = ({ label, v, mono }) => (
  <div>
    <div style={{ fontSize:11, fontWeight:600, letterSpacing:'.06em', textTransform:'uppercase', color:'var(--text-dim)', marginBottom:6 }}>{label}</div>
    <div style={{ height:46, padding:'0 14px', background:'var(--ink-2)', border:'1px solid var(--hair-strong)', borderRadius:10,
                  color:'var(--text)', fontSize:14, fontFamily: mono?'JetBrains Mono':'inherit', display:'flex', alignItems:'center' }}>{v}</div>
  </div>
);

// ============================================================
// APP
// ============================================================
function App() {
  const [screen, setScreen] = useState('landing');
  const cur = SCREENS.find(s => s.id === screen);
  const goTo = (id) => setScreen(id);

  const render = () => {
    switch (screen) {
      case 'landing': return <DesktopFrame><Landing /></DesktopFrame>;
      case 'login':   return <PhoneFrame><Login /></PhoneFrame>;
      case 'wallet':  return <PhoneFrame><WalletHome goTo={goTo} /></PhoneFrame>;
      case 'qr':      return <PhoneFrame><MyQR goTo={goTo} /></PhoneFrame>;
      case 'add':     return <PhoneFrame><AddCredential goTo={goTo} /></PhoneFrame>;
      case 'session': return <PhoneFrame><ActiveSession goTo={goTo} /></PhoneFrame>;
      case 'mhome':   return <TabletFrame><MedicHome goTo={goTo} /></TabletFrame>;
      case 'msite':   return <TabletFrame><MedicSite goTo={goTo} /></TabletFrame>;
      case 'mscan':   return <TabletFrame><ScannerScreen goTo={goTo} /></TabletFrame>;
      case 'pass':    return <TabletFrame><VerifyScreen goTo={goTo} pass={true}  /></TabletFrame>;
      case 'fail':    return <TabletFrame><VerifyScreen goTo={goTo} pass={false} /></TabletFrame>;
      case 'roster':  return <TabletFrame><Roster goTo={goTo} /></TabletFrame>;
      case 'admin':   return <DesktopFrame><Admin goTo={goTo} /></DesktopFrame>;
      case 'siteNew': return <DesktopFrame><SiteNew goTo={goTo} /></DesktopFrame>;
      default: return null;
    }
  };

  return (
    <div style={{ minHeight:'100vh' }}>
      <div style={{ position:'sticky', top:0, zIndex:10, background:'rgba(11,13,17,0.92)', backdropFilter:'blur(10px)',
                    borderBottom:'1px solid var(--hair)' }}>
        <div style={{ maxWidth:1340, margin:'0 auto', padding:'14px 24px', display:'flex', alignItems:'center', gap:18 }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <SWMark size={30} />
            <div>
              <div style={{ fontSize:14, fontWeight:700 }}>Rigwise</div>
              <div style={{ fontSize:11, color:'var(--text-faint)' }}>Interactive demo · 14 screens</div>
            </div>
          </div>
          <div style={{ flex:1 }} />
          <div style={{ display:'flex', gap:4, flexWrap:'wrap', background:'var(--ink-2)', padding:4, borderRadius:12,
                        border:'1px solid var(--hair)' }}>
            {SCREENS.map(s => (
              <button key={s.id} onClick={()=>setScreen(s.id)} style={{
                padding:'7px 12px', borderRadius:8, border:0, cursor:'pointer',
                background: screen===s.id ? 'var(--ink-3)' : 'transparent',
                color: screen===s.id ? 'var(--text)' : 'var(--text-dim)',
                fontSize:11, fontWeight:600, fontFamily:'inherit',
                display:'flex', alignItems:'center', gap:7,
              }}>
                <span style={{ fontFamily:'JetBrains Mono', fontSize:10, color: screen===s.id ? GROUP_COLOR[s.group] : 'var(--text-faint)' }}>{s.num}</span>
                {s.label}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div style={{ padding:'40px 24px 80px', display:'flex', flexDirection:'column', alignItems:'center', gap:18 }}>
        <div style={{ width:'100%', maxWidth:1340, display:'flex', alignItems:'flex-end', justifyContent:'space-between' }}>
          <div>
            <div style={{ display:'inline-flex', alignItems:'center', gap:8, fontFamily:'JetBrains Mono', fontSize:11,
                          letterSpacing:'.1em', textTransform:'uppercase', color:'var(--text-faint)', fontWeight:600 }}>
              <span style={{ width:8, height:8, borderRadius:999, background:GROUP_COLOR[cur.group] }} />
              {cur.num} · {cur.group} · {cur.device}
            </div>
            <div style={{ fontSize:22, fontWeight:700, marginTop:6, letterSpacing:'-.01em' }}>{cur.label}</div>
          </div>
        </div>
        <div className="fade" style={{ display:'flex', justifyContent:'center', width:'100%' }}>
          {render()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
